<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTIMATE CHAOS - MERA YESU FIX</title>
<style>
  body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial Black', sans-serif;
    user-select: none;
    background: white;
  }

  #mainBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 25px 50px;
    font-size: 32px;
    font-weight: 900;
    color: white;
    background: #000;
    border: 5px solid white;
    border-radius: 20px;
    cursor: pointer;
    z-index: 10000;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    transition: transform 0.1s;
    white-space: nowrap;
  }

  .word {
    position: absolute;
    font-weight: 900;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    transform-origin: center center;
    transition: all 0.4s ease-out;
  }

  .shake-active { animation: shake 0.15s infinite; }
  @keyframes shake {
    0% { transform: translate(1px, 1px); }
    50% { transform: translate(-3px, 2px); }
    100% { transform: translate(1px, -2px); }
  }
</style>
</head>
<body>

<button id="mainBtn">START 😈</button>
<div id="wordsContainer"></div>

<!-- 🔊 AUDIO ASSETS -->
<audio id="balliSound" src="balli.mp3" preload="auto"></audio>
<!-- Updated to match your new GitHub filename verbatim -->
<audio id="yeshuSound" src="mera-yesu.mp3" preload="auto"></audio>
<audio id="sunderSound" src="sunder.mp3.ogg" preload="auto"></audio>

<script>
  let stage = 0;
  let running = false;
  let chaosInterval;
  let text = "";
  let wordCount = 0; 
  
  const siteUrl = "https://sites.google.com/view/your-site";
  const btn = document.getElementById('mainBtn');
  const container = document.getElementById('wordsContainer');

  /* RGB BACKGROUND */
  setInterval(() => {
    const hue = Math.floor(Math.random() * 360);
    document.body.style.backgroundColor = `hsl(${hue}, 100%, 75%)`;
  }, 150);

  function stopEverything() {
    running = false;
    clearInterval(chaosInterval);
    wordCount = 0; 
    document.body.classList.remove('shake-active');
    container.innerHTML = "";
    
    ["balliSound", "yeshuSound", "sunderSound"].forEach(id => {
      const s = document.getElementById(id);
      if(s) { s.pause(); s.currentTime = 0; }
    });
  }

  function playSound(name) {
    let id = "";
    if(name === "Balli") id = "balliSound";
    if(name === "YESHU") id = "yeshuSound"; 
    if(name === "SUNDERI MUNDRI") id = "sunderSound";
    
    const s = document.getElementById(id);
    if(s) { 
      s.muted = false;
      s.load(); // Force fresh load
      s.play().catch(e => console.error("Playback failed:", e)); 
    }
  }

  function createWord() {
    if (wordCount >= 20) {
      clearInterval(chaosInterval); // STOP SPAWNING after 20 words
      return;
    }

    const div = document.createElement('div');
    div.className = 'word';
    div.innerText = text;
    div.style.fontSize = (Math.floor(Math.random() * 40) + 25) + "px";
    div.style.color = `hsl(${Math.random() * 360}, 100%, 30%)`;
    
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);
    div.style.left = x + "px";
    div.style.top = y + "px";
    div.style.transform = `rotate(${Math.random() * 360}deg)`;
    
    container.appendChild(div);
    wordCount++;
  }

  function startChaos(wordText) {
    stopEverything();
    text = wordText;
    running = true;
    playSound(wordText);
    document.body.classList.add('shake-active');
    
    chaosInterval = setInterval(() => {
      if(running) {
        createWord();
        const words = document.getElementsByClassName('word');
        for (let w of words) {
          w.style.transform = `rotate(${Math.random() * 360}deg) scale(${0.8 + Math.random()})`;
        }
      }
    }, 200);
  }

  /* BUTTON CLICK LOGIC */
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if(stage === 0) { btn.innerText = "BALLI"; stage = 1; } 
    else if(stage === 1) { startChaos("Balli"); stage = 2; }
    else if(stage === 2) { stopEverything(); btn.innerText = "YESHU"; stage = 3; }
    else if(stage === 3) { startChaos("YESHU"); stage = 4; }
    else if(stage === 4) { stopEverything(); btn.innerText = "SUNDERI MUNDRI"; stage = 5; }
    else if(stage === 5) { startChaos("SUNDERI MUNDRI"); stage = 6; }
    else if(stage === 6) { window.location.href = siteUrl; }
  });

  document.body.addEventListener('click', () => {
    if(stage === 6) { window.location.href = siteUrl; } 
    else if(stage === 2 || stage === 4) { stopEverything(); }
  });
</script>
</body>
</html>
