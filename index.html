<style>
/* 🌈 PAGE GLOW */
body {
  margin: 0;
  min-height: 100vh;
  border: 6px solid transparent;
  box-shadow: inset 0 0 30px rgba(0,255,255,0.6),
              0 0 40px rgba(255,0,255,0.4);
  cursor: none;
  overflow: hidden;
}

/* 🌟 BUTTON GLOW */
#mainBtn {
  padding: 15px 30px;
  font-size: 20px;
  border: 2px solid #00f7ff;
  background: black;
  color: white;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
}

#mainBtn:hover {
  box-shadow: 0 0 25px #00f7ff, 0 0 50px #00f7ff;
  transform: scale(1.05);
}

/* ✨ WORDS */
.word {
  position: absolute;
  font-weight: bold;
}

/* 🌟 CURSOR GLOW */
#cursorGlow {
  position: fixed;
  width: 18px;
  height: 18px;
  background: cyan;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 10px cyan, 0 0 25px cyan, 0 0 45px cyan;
  transform: translate(-50%, -50%);
  z-index: 9999;
}
</style>

<div id="words"></div>
<button id="mainBtn">Start</button>

<audio id="balliSound" src="balli.mp3"></audio>

<script>
let stage = 0;
let count = 10;
let text = "";
let running = false;

/* PLAY SOUND */
function playBalli(){
  const s = document.getElementById("balliSound");
  s.currentTime = 0;
  s.play().catch(()=>{});
}

/* STOP SOUND */
function stopAllSounds(){
  document.querySelectorAll("audio").forEach(a => {
    a.pause();
    a.currentTime = 0;
  });
}

/* RGB BACKGROUND */
setInterval(()=>{
  let hue = Math.random()*360;
  document.body.style.background = "hsl("+hue+",100%,50%)";
},200);

/* START */
function startCircle(word){
  text = word;
  count = 10;
  running = true;

  if(word === "Balli") playBalli();

  document.body.classList.add("shake");
  grow();
}

/* GROW */
function grow(){
  if(!running) return;

  count += 5;
  let container = document.getElementById("words");
  container.innerHTML = "";

  let radius = Math.min(window.innerWidth, window.innerHeight)/2 - 40;

  for(let i=0;i<count;i++){
    let angle = (i/count)*360;
    let div = document.createElement("div");

    div.className = "word";
    div.innerText = text;
    div.style.color = "hsl("+Math.random()*360+",100%,50%)";

    div.style.transform =
      "rotate("+angle+"deg) translate("+radius+"px) rotate(-"+angle+"deg)";

    container.appendChild(div);
  }

  setTimeout(grow,1000);
}

/* BUTTON */
let btn = document.getElementById("mainBtn");

btn.onclick = function(){
  if(stage === 0){
    btn.innerText = "Balli";
    stage = 1;
  }
  else if(stage === 1){
    startCircle("Balli");
    stage = 2;
  }
  else if(stage === 2){
    stopAllSounds();
    running = false;
    document.body.classList.remove("shake");
    btn.innerText = "Yashu";
    stage = 3;
  }
  else if(stage === 3){
    startCircle("Yashu");
    stage = 4;
  }
  else if(stage === 4){
    stopAllSounds();
    running = false;
    document.body.classList.remove("shake");
    btn.innerText = "Sunderi Mundri";
    stage = 5;
  }
  else if(stage === 5){
    startCircle("Sunderi Mundri");
    stage = 6;
  }
};

/* CLICK STOP */
document.body.addEventListener("click", function(e){
  if(e.target.id === "mainBtn") return;

  if(stage === 2 || stage === 4 || stage === 6){
    stopAllSounds();
    running = false;
    document.body.classList.remove("shake");
  }
});

/* 🌟 CURSOR */
const cursor = document.createElement("div");
cursor.id = "cursorGlow";
document.body.appendChild(cursor);

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>
