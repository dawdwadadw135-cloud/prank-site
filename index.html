<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
}

#mainBtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 30px;
  font-size:22px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  z-index:10;
}

.word{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:0 0;
  font-size:24px;
  font-weight:bold;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  20%{transform:translate(-10px,10px);}
  40%{transform:translate(10px,-10px);}
  60%{transform:translate(-10px,-10px);}
  80%{transform:translate(10px,10px);}
  100%{transform:translate(0,0);}
}

.shake{
  animation:shake 0.3s infinite;
}
</style>

<button id="mainBtn">CLICK ME 😈</button>
<div id="words"></div>

<!-- 🔊 YOUR BALLI VOICE -->
<audio id="balliSound" src="balli.mp3"></audio>

<script>
let stage = 0;
let count = 10;
let text = "";
let running = false;

/* PLAY BALLI VOICE */
function playBalli(){
  let s = document.getElementById("balliSound");
  s.muted = false;
  s.currentTime = 0;
  s.play().catch(()=>{});
}                                                                                                         

/* RGB BACKGROUND */
setInterval(()=>{
  let hue = Math.random()*360;
  document.body.style.background = "hsl("+hue+",100%,50%)";
},200);

/* START CIRCLE */
function startCircle(word){
  text = word;
  count = 10;
  running = true;

  if(word === "Balli"){
    playBalli(); // 🔊 plays your 10 sec voice
  }

  document.body.classList.add("shake");
  grow();
}

/* GROW WORDS */
function grow(){
  if(!running) return;

  count += 5;
  let container = document.getElementById("words");
  container.innerHTML = "";

  let radius = Math.min(window.innerWidth, window.innerHeight)/2 - 40;

  for(let i=0;i<count;i++){
    let angle = (i/count)*360;
    let div = document.createElement("div");

    div.className = "word";
    div.innerText = text;
    div.style.color = "hsl("+Math.random()*360+",100%,50%)";

    div.style.transform =
      "rotate("+angle+"deg) translate("+radius+"px) rotate(-"+angle+"deg)";

    container.appendChild(div);
  }

  setTimeout(grow,1000);
}

/* BUTTON LOGIC */
let btn = document.getElementById("mainBtn");

btn.onclick = function(){
  if(stage === 0){
    btn.innerText = "Balli";
    stage = 1;
  }
  else if(stage === 1){
    startCircle("Balli");
    stage = 2;
  }
  else if(stage === 2){
    running = false;
    document.body.classList.remove("shake");
    btn.innerText = "Yashu";
    stage = 3;
  }
  else if(stage === 3){
    startCircle("Yashu");
    stage = 4;
  }
  else if(stage === 4){
    running = false;
    document.body.classList.remove("shake");
    btn.innerText = "Sunderi Mundri";
    stage = 5;
  }
  else if(stage === 5){
    startCircle("Sunderi Mundri");
    stage = 6;
  }
};

/* SCREEN CLICK */
document.body.addEventListener("click", function(e){
  if(e.target.id === "mainBtn") return;

  if(stage === 2 || stage === 4 || stage === 6){
    running = false;
    document.body.classList.remove("shake");

    if(stage === 6){
      window.top.location.href = "https://sites.google.com/view/your-site";
    }
  }
});
</script>
